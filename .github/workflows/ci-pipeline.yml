name: Sakila App CI Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: 'sakila-app'
  MYSQL_ROOT_PASSWORD: admin
  MYSQL_DATABASE: sakila

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Linting Tools
        run: pip install flake8
      - name: Run Lint Check
        run: flake8 . --max-line-length 120 --ignore E501,W503 --exit-zero

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ env.MYSQL_DATABASE }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest  # Force install pytest just in case
      - name: Download and Import Sakila Data
        run: |
          curl -L https://downloads.mysql.com/docs/sakila-db.tar.gz | tar -xz
          sleep 15
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -u root -p${{ env.MYSQL_ROOT_PASSWORD }} < sakila-db/sakila-data.sql
      - name: Run Pytest
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: root
          MYSQL_PASSWORD: ${{ env.MYSQL_ROOT_PASSWORD }}
          MYSQL_DB: ${{ env.MYSQL_DATABASE }}
          PYTHONPATH: ${{ github.workspace }}  # FIX: Tells Python to look in the root folder for your app
        run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Verify Image
        run: docker images
      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 --name smoke-test \
            -e MYSQL_HOST=nonexistent \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 15
          curl -f http://localhost:5000 || exit 1

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Image for Scan
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-results.txt'
      - name: Upload Scan Result
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.txt